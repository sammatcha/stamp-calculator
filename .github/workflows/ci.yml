name: CI

on:
  pull_request:
    branches: [ "testing", "main" ]
  push:
    branches: [ "testing" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Build and export static site
        run: npm run build

       
       